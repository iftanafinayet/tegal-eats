name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight to be safe
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install @supabase/supabase-js
      - run: node scripts/keep-supabase-alive.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.REACT_APP_SUPABASE_ANON_KEY }}
